name: Sync to elai1 for Vercel

on:
  push:
    branches: [ main ]
    # 可以指定路徑，避免不必要的觸發
    # paths:
    #   - '**'
    #   - '!.github/**'

jobs:
  sync-to-elai1:
    runs-on: ubuntu-latest
    if: github.repository == 'julian67chou/elai'
    
    steps:
    - name: Checkout elai repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 獲取所有歷史
        token: ${{ secrets.ELAI1_SYNC_TOKEN }}
    
    - name: Configure Git
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
    
    - name: Add elai1 as remote
      run: |
        git remote add elai1 https://x-access-token:${{ secrets.ELAI1_SYNC_TOKEN }}@github.com/julian67chou/elai1.git
    
    - name: Push to elai1 (force update)
      run: |
        # 強制推送到 elai1 的 main 分支
        git push elai1 HEAD:main --force
        
    - name: Create sync status
      run: |
        echo "✅ 同步完成！" >> sync-status.md
        echo "源倉庫: ${{ github.repository }}" >> sync-status.md
        echo "目標倉庫: julian67chou/elai1" >> sync-status.md
        echo "提交: ${{ github.sha }}" >> sync-status.md
        echo "時間: $(date)" >> sync-status.md
    
    - name: Upload sync status
      uses: actions/upload-artifact@v4
      with:
        name: sync-status
        path: sync-status.md