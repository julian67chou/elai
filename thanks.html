<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>預約送出 — 伊萊診所</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: linear-gradient(135deg, #f8f4e9 0%, white 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #333;
}
.card {
  background: white;
  border-radius: 16px;
  padding: 3rem;
  text-align: center;
  max-width: 480px;
  width: 90%;
  box-shadow: 0 10px 40px rgba(0,0,0,0.08);
}
.icon {
  width: 72px; height: 72px;
  background: linear-gradient(135deg, #10495C, #F19C32);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
  font-size: 2rem; color: white;
}
h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 1.5rem;
  color: #10495C;
  margin-bottom: 1rem;
}
p {
  color: #666;
  line-height: 1.8;
  margin-bottom: 2rem;
  font-size: 0.95rem;
}
.btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: #F19C32; color: white;
  padding: 0.85rem 2rem; border-radius: 50px;
  text-decoration: none; font-weight: 600; font-size: 0.95rem;
  transition: all 0.3s ease;
}
.btn:hover { background: #d4892a; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(241,156,50,0.35); }
@media (max-width: 480px) {
  .card { padding: 2rem 1.5rem; }
  h1 { font-size: 1.3rem; }
}
</style>
</head>
<body>
<div class="card">
  <div class="icon"><i class="bi bi-check-lg"></i></div>
  <h1>預約已送出</h1>
  <p>感謝您的預約！<br>我們將在營業時間內儘快與您聯繫確認，<br>謝謝您的耐心等候。</p>
  <a href="/" class="btn"><i class="bi bi-arrow-left"></i> 返回首頁</a>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</body>
</html>
